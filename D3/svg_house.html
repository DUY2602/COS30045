<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>SVG House</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #e0f7ff;
      text-align: center;
      font-family: Arial, sans-serif;
    }
    h1 {
      color: #2f4f4f;
      margin: 20px 0 10px;
    }
  </style>
</head>
<body>

  <h1>My SVG House</h1>

  <svg width="400" height="320" viewBox="0 0 400 320">

    <!-- Background sky -->
    <rect x="0" y="0" width="400" height="320" fill="#e0f7ff" />

    <!-- Sun -->
    <circle cx="340" cy="60" r="30" fill="yellow" stroke="orange" stroke-width="4"/>

    <!-- Grass / garden ground -->
    <rect x="0" y="220" width="400" height="100" fill="#7cfc00" />

    <!-- ============= GROUP: House ============= -->
    <g id="house" transform="translate(120, 100)">

      <!-- House body -->
      <rect x="0" y="40" width="160" height="120" fill="#f4a460" stroke="#8b4513" stroke-width="5"/>

      <!-- Roof -->
      <polygon points="0,40 80,0 160,40" fill="#cd5c5c" stroke="#8b0000" stroke-width="5"/>

      <!-- Door -->
      <rect x="60" y="100" width="40" height="60" fill="#8b5a2b" stroke="#3c2f2f" stroke-width="3"/>
      <circle cx="92" cy="130" r="5" fill="#d4a017"/>

      <!-- Window 1 -->
      <g transform="translate(20, 70)">
        <rect width="40" height="40" fill="#87ceeb" stroke="#4682b4" stroke-width="3"/>
        <line x1="0" y1="20" x2="40" y2="20" stroke="#4682b4" stroke-width="3"/>
        <line x1="20" y1="0" x2="20" y2="40" stroke="#4682b4" stroke-width="3"/>
      </g>

      <!-- Window 2 -->
      <g transform="translate(100, 70)">
        <rect width="40" height="40" fill="#87ceeb" stroke="#4682b4" stroke-width="3"/>
        <line x1="0" y1="20" x2="40" y2="20" stroke="#4682b4" stroke-width="3"/>
        <line x1="20" y1="0" x2="20" y2="40" stroke="#4682b4" stroke-width="3"/>
      </g>

      <!-- Chimney -->
      <rect x="110" y="10" width="20" height="35" fill="#808080" stroke="#555" stroke-width="3"/>

    </g>

    <!-- ============= Garden elements ============= -->

    <!-- Cây bên trái nhà -->
    <g transform="translate(60, 175)">
      <rect x="-10" y="0" width="20" height="65" fill="#8b4513"/>
      <ellipse cx="0" cy="-15" rx="45" ry="32" fill="#228b22"/>
      <ellipse cx="-8" cy="-28" rx="35" ry="28" fill="#32cd32"/>
      <ellipse cx="10" cy="-22" rx="32" ry="25" fill="#3cb371"/>
      <text x="0" y="80" font-size="16" fill="#006400" text-anchor="middle">Cây</text>
    </g>

    <!-- Hoa 1 -->
    <g transform="translate(60, 250)">
      <ellipse cx="0" cy="0" rx="18" ry="28" fill="#ff69b4" opacity="0.9"/>
      <ellipse cx="0" cy="0" rx="28" ry="18" fill="#ff1493" opacity="0.8"/>
      <circle cx="0" cy="0" r="10" fill="#ffff00"/>
    </g>

    <!-- Hoa 2 -->
    <g transform="translate(340, 245)">
      <ellipse cx="0" cy="0" rx="22" ry="32" fill="#dda0dd"/>
      <circle cx="0" cy="0" r="12" fill="#fffacd"/>
    </g>

  </svg>

</body>
</html>
